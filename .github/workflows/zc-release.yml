name: release zc folder encryption kit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Needed for creating releases

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Needed for the attestations step
      contents: write # Needed for creating releases
      attestations: write # Needed for creating attestations
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="$(git describe --tags --abbrev=0)"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG} (version ${VERSION})"

      - name: Check if release already exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"

          echo "Checking if release $TAG already exists..."

          if gh release view "$TAG" &> /dev/null; then
            echo "Release $TAG already exists. Exiting workflow successfully."
            echo "exists=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Release $TAG does not exist. Continuing with build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go/encrypt/go.mod

      - name: Build and push release
        id: create_artifact
        if: steps.check_release.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag }}"

          cd go/encrypt
          RELEASE_VERSION="${VERSION}" make release-artifacts
          ls -la release/

          cat > release_notes.md << EOF
          Pre-built \`zc\` binaries for encrypting folders and files.

          | File | Platform |
          | --- | --- |
          | \`zc-${VERSION}-linux-amd64\` | Linux x86_64 |
          | \`zc-${VERSION}-linux-arm64\` | Linux ARM64 |
          | \`zc-${VERSION}-windows-amd64.exe\` | Windows x86_64 |
          | \`zc-${VERSION}-darwin-amd64\` | macOS x86_64 |
          | \`zc-${VERSION}-darwin-arm64\` | macOS Apple Silicon |

          For full instructions, see the README in the repository.
          EOF

          gh release create "$TAG" \
            --title "zc $TAG" \
            --notes-file release_notes.md \
            release/*

      - name: Attest
        if: steps.check_release.outputs.exists != 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*
